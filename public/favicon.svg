<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Fondo oscuro -->
  <rect width="64" height="64" fill="#0a0504"/>

  <!-- Borde pixel art -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#8b7355" stroke-width="4"/>

  <!-- Calavera pixelada (simplificada) -->
  <!-- Parte superior del craneo -->
  <rect x="20" y="14" width="4" height="4" fill="#c9b896"/>
  <rect x="24" y="14" width="16" height="4" fill="#c9b896"/>
  <rect x="40" y="14" width="4" height="4" fill="#c9b896"/>

  <!-- Medio del craneo -->
  <rect x="16" y="18" width="4" height="4" fill="#c9b896"/>
  <rect x="20" y="18" width="24" height="4" fill="#c9b896"/>
  <rect x="44" y="18" width="4" height="4" fill="#c9b896"/>

  <!-- Ojos vacios -->
  <rect x="16" y="22" width="4" height="4" fill="#c9b896"/>
  <rect x="20" y="22" width="8" height="4" fill="#0a0504"/>
  <rect x="28" y="22" width="8" height="4" fill="#c9b896"/>
  <rect x="36" y="22" width="8" height="4" fill="#0a0504"/>
  <rect x="44" y="22" width="4" height="4" fill="#c9b896"/>

  <!-- Nariz -->
  <rect x="16" y="26" width="4" height="4" fill="#c9b896"/>
  <rect x="20" y="26" width="8" height="4" fill="#c9b896"/>
  <rect x="28" y="26" width="4" height="4" fill="#0a0504"/>
  <rect x="32" y="26" width="8" height="4" fill="#c9b896"/>
  <rect x="40" y="26" width="8" height="4" fill="#c9b896"/>

  <!-- Mandibula superior -->
  <rect x="16" y="30" width="4" height="4" fill="#c9b896"/>
  <rect x="20" y="30" width="24" height="4" fill="#c9b896"/>
  <rect x="44" y="30" width="4" height="4" fill="#c9b896"/>

  <!-- Dientes -->
  <rect x="20" y="34" width="4" height="4" fill="#c9b896"/>
  <rect x="24" y="34" width="4" height="4" fill="#0a0504"/>
  <rect x="28" y="34" width="4" height="4" fill="#c9b896"/>
  <rect x="32" y="34" width="4" height="4" fill="#0a0504"/>
  <rect x="36" y="34" width="4" height="4" fill="#c9b896"/>
  <rect x="40" y="34" width="4" height="4" fill="#0a0504"/>

  <!-- Mandibula inferior -->
  <rect x="20" y="38" width="24" height="4" fill="#c9b896"/>
  <rect x="24" y="42" width="4" height="4" fill="#c9b896"/>
  <rect x="28" y="42" width="4" height="4" fill="#0a0504"/>
  <rect x="32" y="42" width="4" height="4" fill="#c9b896"/>
  <rect x="36" y="42" width="4" height="4" fill="#0a0504"/>

  <!-- Fuego interior (ojos) -->
  <rect x="22" y="24" width="4" height="2" fill="#ff6b00"/>
  <rect x="38" y="24" width="4" height="2" fill="#ff6b00"/>

  <!-- Detalles de fuego -->
  <rect x="24" y="46" width="4" height="4" fill="#ff6b00"/>
  <rect x="32" y="46" width="4" height="4" fill="#ff6b00"/>
  <rect x="28" y="50" width="4" height="4" fill="#ff6b00"/>

  <!-- Decoracion lateral (espadas) -->
  <rect x="8" y="20" width="4" height="16" fill="#4a3728"/>
  <rect x="52" y="20" width="4" height="16" fill="#4a3728"/>

  <!-- Cruz superior -->
  <rect x="30" y="6" width="4" height="6" fill="#8b7355"/>
  <rect x="26" y="8" width="12" height="4" fill="#8b7355"/>
</svg>
