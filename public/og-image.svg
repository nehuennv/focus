<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fondo -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0504"/>
      <stop offset="50%" style="stop-color:#1a1008"/>
      <stop offset="100%" style="stop-color:#0a0504"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Borde pixel art -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#8b7355" stroke-width="8"/>
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#3d2817" stroke-width="4"/>

  <!-- Título principal -->
  <text x="600" y="180" text-anchor="middle" fill="#c9b896" font-family="'Press Start 2P', monospace" font-size="72" filter="url(#glow)">
    FOCUS SOULS
  </text>

  <!-- Subtítulo -->
  <text x="600" y="240" text-anchor="middle" fill="#8b7355" font-family="monospace" font-size="28">
    RITUAL DE ENFOQUE
  </text>

  <!-- Calavera central -->
  <g transform="translate(600, 400)">
    <!-- Craneo -->
    <rect x="-60" y="-80" width="120" height="100" fill="#c9b896" rx="10"/>
    <!-- Ojos -->
    <rect x="-45" y="-60" width="35" height="35" fill="#0a0504"/>
    <rect x="10" y="-60" width="35" height="35" fill="#0a0504"/>
    <!-- Ojos con fuego -->
    <rect x="-35" y="-50" width="15" height="10" fill="#ff6b00"/>
    <rect x="20" y="-50" width="15" height="10" fill="#ff6b00"/>
    <!-- Nariz -->
    <rect x="-10" y="-30" width="20" height="25" fill="#0a0504"/>
    <!-- Dientes -->
    <rect x="-40" y="0" width="15" height="20" fill="#c9b896"/>
    <rect x="-20" y="0" width="10" height="20" fill="#0a0504"/>
    <rect x="-5" y="0" width="15" height="20" fill="#c9b896"/>
    <rect x="15" y="0" width="10" height="20" fill="#0a0504"/>
    <rect x="30" y="0" width="15" height="20" fill="#c9b896"/>
  </g>

  <!-- Decoración: espadas cruzadas -->
  <g transform="translate(150, 400)" opacity="0.3">
    <rect x="0" y="-100" width="20" height="200" fill="#4a3728" transform="rotate(30)"/>
    <rect x="0" y="-100" width="20" height="200" fill="#4a3728" transform="rotate(-30)"/>
  </g>

  <!-- Features -->
  <text x="600" y="540" text-anchor="middle" fill="#dc2626" font-family="monospace" font-size="24">
    ⚔️ DOMINIOS • BESTIARIO • TROFEOS ⚔️
  </text>

  <!-- Esquinas decorativas -->
  <rect x="40" y="40" width="40" height="40" fill="#8b7355"/>
  <rect x="1120" y="40" width="40" height="40" fill="#8b7355"/>
  <rect x="40" y="550" width="40" height="40" fill="#8b7355"/>
  <rect x="1120" y="550" width="40" height="40" fill="#8b7355"/>
</svg>
